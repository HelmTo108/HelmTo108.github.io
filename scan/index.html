<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>boot — aricbolder.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080d14;
    --bg-panel: #0c1420;
    --text:     #8baabb;
    --dim:      #3a5060;
    --teal:     #4ec9b0;
    --green:    #6adf78;
    --amber:    #e8b84b;
    --red:      #d94f5c;
    --blue:     #569cd6;
    --purple:   #c586c0;
    --bright:   #c8d8e8;
    --cursor:   #4ec9b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.65;
    overflow: hidden;
  }

  /* CRT scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* vignette */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 99;
  }

  #terminal {
    position: fixed; inset: 0;
    padding: 18px 30px 22px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  #output {
    display: flex;
    flex-direction: column;
  }

  .line {
    display: block;
    white-space: pre;
    min-height: 1.65em;
    animation: linein 0.08s ease-out;
  }

  @keyframes linein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* color helpers */
  .c-dim    { color: var(--dim);    }
  .c-text   { color: var(--text);   }
  .c-bright { color: var(--bright); }
  .c-teal   { color: var(--teal);   }
  .c-green  { color: var(--green);  font-weight: 500; }
  .c-amber  { color: var(--amber);  }
  .c-red    { color: var(--red);    }
  .c-blue   { color: var(--blue);   }
  .c-purple { color: var(--purple); }

  /* systemd status brackets */
  .ok     { color: var(--green);  }
  .fail   { color: var(--red);    }
  .warn   { color: var(--amber);  }
  .info   { color: var(--blue);   }
  .svc    { color: var(--text);   }

  /* blinking block cursor */
  .typed-cursor {
    display: inline-block;
    width: 8px; height: 13px;
    background: var(--cursor);
    vertical-align: middle;
    animation: blink 1s step-end infinite;
    opacity: 0.9;
  }

  @keyframes blink {
    0%,100% { opacity: 0.9; }
    50%      { opacity: 0;   }
  }
</style>
</head>
<body>
<div id="terminal"><div id="output"></div></div>
<script>
// ─── HELPERS ─────────────────────────────────────────────────────────────────
const sleep  = ms => new Promise(r => setTimeout(r, ms));
const rand   = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const pick   = a => a[rand(0,a.length-1)];
const pad    = (s,n) => String(s).padEnd(n);
const lpad   = (s,n) => String(s).padStart(n,' ');
const hex2   = n => n.toString(16).padStart(2,'0');
const hex4   = n => n.toString(16).padStart(4,'0');
const hex8   = n => n.toString(16).padStart(8,'0');
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── OUTPUT ENGINE ───────────────────────────────────────────────────────────
const output  = document.getElementById('output');
const MAX_LINES = 320;

function appendEl(html, extraClass='') {
  const el = document.createElement('span');
  el.className = 'line' + (extraClass ? ' '+extraClass : '');
  el.innerHTML = html;
  output.appendChild(el);
  while (output.children.length > MAX_LINES) output.removeChild(output.firstChild);
  return el;
}

function blank(cls='c-dim') { appendEl('&nbsp;', cls); }

// print a line immediately (no await)
function printNow(html, cls='') { appendEl(html, cls); }

// print with a preceding delay
async function print(html, pre=0, cls='') {
  if (pre) await sleep(pre);
  appendEl(html, cls);
}

// print many lines with a fixed gap between each
async function burst(lines, gap=14) {
  for (const l of lines) { appendEl(l); await sleep(gap); }
}

async function measured(lines, gap=210, jitter=80) {
  for (const l of lines) { appendEl(l); await sleep(gap + rand(-jitter, jitter)); }
}

// ─── COLOR WRAPPERS ──────────────────────────────────────────────────────────
const c = {
  dim:    s => `<span class="c-dim">${esc(s)}</span>`,
  text:   s => `<span class="c-text">${esc(s)}</span>`,
  bright: s => `<span class="c-bright">${esc(s)}</span>`,
  teal:   s => `<span class="c-teal">${esc(s)}</span>`,
  green:  s => `<span class="c-green">${esc(s)}</span>`,
  amber:  s => `<span class="c-amber">${esc(s)}</span>`,
  red:    s => `<span class="c-red">${esc(s)}</span>`,
  blue:   s => `<span class="c-blue">${esc(s)}</span>`,
  purple: s => `<span class="c-purple">${esc(s)}</span>`,
};

// ─── TYPING EFFECT ───────────────────────────────────────────────────────────
async function typeLine(promptHtml, cmd, preDelay=900) {
  await sleep(preDelay);
  const el = appendEl(promptHtml + '<span class="typed-cursor"></span>');
  await sleep(180);

  let typed = '';
  const cursor = el.querySelector('.typed-cursor');

  for (const ch of cmd) {
    typed += ch;
    el.innerHTML = promptHtml + esc(typed) + '<span class="typed-cursor"></span>';
    await sleep(rand(48, 140));
  }

  el.innerHTML = promptHtml + esc(cmd);
  await sleep(220);
}

// ─── RANDOM DATA GENERATORS ──────────────────────────────────────────────────
function kernelVer() {
  return pick(['6.1.69','6.5.13','6.6.8','5.15.148','6.2.16','6.8.2']);
}
function distro() {
  return pick([
    {name:'Ubuntu 22.04.3 LTS', id:'ubuntu'},
    {name:'Debian GNU/Linux 12 (bookworm)', id:'debian'},
    {name:'Rocky Linux 8.9 (Green Obsidian)', id:'rocky'},
    {name:'CentOS Stream 9', id:'centos'},
    {name:'Arch Linux', id:'arch'},
  ]);
}
function hardware() {
  const cpu = pick([
    'Intel(R) Xeon(R) Silver 4314 CPU @ 2.40GHz',
    'AMD EPYC 7302P 16-Core Processor',
    'Intel(R) Core(TM) i7-12700 @ 2.10GHz',
    'Intel(R) Xeon(R) Gold 5318Y CPU @ 2.10GHz',
    'AMD Ryzen 9 5950X 16-Core Processor',
  ]);
  const cores   = pick([4,8,16,32]);
  const ramGB   = pick([8,16,32,64,128]);
  const ramMB   = ramGB * 1024;
  const disk    = pick([
    {dev:'nvme0n1', model:'Samsung 980 PRO 1TB',   size:'953.9 GiB'},
    {dev:'sda',     model:'ST4000DM004-2CV104',     size:'3.6 TiB'},
    {dev:'nvme0n1', model:'WD_BLACK SN850X 2TB',    size:'1.8 TiB'},
    {dev:'vda',     model:'VirtIO Block Device',     size:'80 GiB'},
    {dev:'sda',     model:'QEMU HARDDISK',           size:'64 GiB'},
  ]);
  const nic = pick([
    {dev:'eth0',  driver:'e1000e',   speed:'1000Mbps'},
    {dev:'ens3',  driver:'virtio_net',speed:'10000Mbps'},
    {dev:'enp3s0',driver:'r8169',    speed:'1000Mbps'},
    {dev:'ens192',driver:'vmxnet3',  speed:'10000Mbps'},
  ]);
  return { cpu, cores, ramGB, ramMB, disk, nic };
}
function hostname() {
  const pfx = pick(['srv','web','db','fw','vpn','mon','mgmt','prod','dev','k8s','ci','nas','edge']);
  const n   = lpad(rand(1,99), 2).replace(' ','0');
  const dom = pick(['corp.local','internal','lan','mgmt.local','infra.local']);
  return `${pfx}-${n}.${dom}`;
}
function pciAddr() {
  return `${hex4(rand(0,8))}:${hex2(rand(0,31))}:${hex2(rand(0,7))}.${rand(0,7)}`;
}
function ktime(base, delta) {
  const t = base + delta;
  return `[${lpad(t.toFixed(6),12)}]`;
}

// ─── PHASE 1: BIOS / FIRMWARE ─────────────────────────────────────────────────
async function phaseBios(hw) {
  const bios = pick([
    { type:'UEFI', vendor:'American Megatrends', ver:`${rand(2,5)}.${rand(0,9)}${rand(0,9)}${rand(0,9)}` },
    { type:'SeaBIOS', vendor:'SeaBIOS', ver:'1.16.2' },
    { type:'OVMF', vendor:'OVMF', ver:'202302' },
  ]);

  await burst([
    bios.type === 'SeaBIOS'
      ? c.dim(`SeaBIOS (version ${bios.ver})`)
      : c.dim(`${bios.vendor} UEFI BIOS Utility — Version ${bios.ver}`),
    c.dim(`Copyright (C) ${bios.vendor}. All Rights Reserved.`),
  ], 60);

  blank();
  await sleep(200);

  await burst([
    c.text(`CPU: ${hw.cpu}`),
    c.text(`Cores: ${hw.cores}  Threads: ${hw.cores*2}  Speed: ${rand(2000,3600)} MHz`),
    c.text(`Total Memory: ${hw.ramMB} MB`),
  ], 55);

  await sleep(180);

  await burst([
    c.dim(`Detecting storage devices...`),
    c.text(`  [${rand(0,3)}] ${hw.disk.model}  (${hw.disk.dev})  ${hw.disk.size}`),
    c.dim(`Initializing PCI Express...`),
    c.text(`  [${pciAddr()}] ${pick(['Intel Corporation','Broadcom','Realtek','VMware'])}: ${pick(['Ethernet Controller','SCSI Controller','USB Controller','Audio Device'])}`),
  ], 55);

  blank();
  await sleep(150);
  printNow(c.dim('Loading boot loader...'));
  await sleep(420);
}

// ─── PHASE 2: GRUB ───────────────────────────────────────────────────────────
async function phaseGrub(dist, kv) {
  blank();
  await burst([
    c.bright(`                        GNU GRUB  version 2.12`),
  ], 80);
  blank();

  await burst([
    c.teal(`  *${dist.name}, with Linux ${kv}`),
    c.dim(`   ${dist.name}, with Linux ${kv} (recovery mode)`),
    c.dim(`   Advanced options for ${dist.name}`),
    c.dim(`   UEFI Firmware Settings`),
  ], 35);

  blank();

  // countdown line — update in place
  const cdEl = appendEl(c.dim(`   The highlighted entry will be executed automatically in 3s`));
  for (let i = 2; i >= 0; i--) {
    await sleep(500);
    cdEl.innerHTML = c.dim(`   The highlighted entry will be executed automatically in ${i}s`);
  }
  blank();
  await sleep(200);
}

// ─── PHASE 3: KERNEL DECOMPRESS ──────────────────────────────────────────────
async function phaseKernelStart(kv) {
  await burst([
    c.dim(`Decompressing Linux... `),
    c.dim(`Parsing EFI HOB list`),
    c.bright(`[    0.000000] Booting Linux on physical CPU 0x0`),
    c.bright(`[    0.000000] Linux version ${kv} (gcc version 12.3.0 (Ubuntu 12.3.0-1ubuntu1~22.04)) #1 SMP PREEMPT_DYNAMIC`),
  ], 80);
}

// ─── PHASE 5: SYSTEMD INIT ───────────────────────────────────────────────────

async function phaseSystemd(host, dist) {
  blank();
  printNow(`         <span class="c-teal">systemd</span> <span class="c-dim">${esc(dist.name)} (${host})</span>`);
  blank();
  await sleep(400);

  for (const unit of UNITS) {
    // "Starting..." line
    if (unit.starting) {
      printNow(STATUS.star(unit.starting));
      await sleep(unit.delay);
    }

    // status result line
    if (unit.state === 'ok')   printNow(STATUS.ok(unit.started));
    if (unit.state === 'fail') printNow(STATUS.fail('Failed to start ' + unit.started.replace(/^(Started|Finished) /,'')));
    if (unit.state === 'warn') printNow(STATUS.warn(unit.started));
    if (unit.state === 'info') printNow(STATUS.info(unit.started));

    await sleep(rand(60,160));
  }
}

// ─── PHASE 6: LOGIN PROMPT ───────────────────────────────────────────────────
async function phaseLogin(host, dist) {
  blank();
  await sleep(900);
  printNow(c.dim(`Ubuntu ${dist.name === 'Ubuntu 22.04.3 LTS' ? '22.04.3' : '20.04'} LTS ${host} tty1`));
  blank();
  await sleep(400);

  const user = pick(['aric','admin','sysadmin','ubuntu','operator']);
  const el = appendEl(c.bright(`${host} login: `) + '<span class="typed-cursor"></span>');
  await sleep(1400);

  let typed = '';
  for (const ch of user) {
    typed += ch;
    el.innerHTML = c.bright(`${host} login: `) + esc(typed) + '<span class="typed-cursor"></span>';
    await sleep(rand(70,130));
  }
  el.innerHTML = c.bright(`${host} login: `) + esc(user);

  // password field (no echo)
  await sleep(350);
  printNow(c.bright(`Password: `));
  await sleep(rand(1200, 2200));

  return user;
}

// ─── PHASE 7: MOTD + SHELL SESSION ───────────────────────────────────────────
async function phaseSession(host, user, dist, hw) {
  blank();
  await sleep(300);

  // MOTD / last login
  await burst([
    c.dim(`Last login: ${pick(['Mon','Tue','Wed','Thu','Fri'])} ${pick(['Jan','Feb','Mar','Apr','May','Jun'])} ${rand(1,28)} ${lpad(rand(0,23),2,'0').replace(' ','0')}:${lpad(rand(0,59),2,'0').replace(' ','0')}:${lpad(rand(0,59),2,'0').replace(' ','0')} ${new Date().getFullYear()-rand(0,1)} from ${rand(10,192)}.${rand(0,254)}.${rand(0,254)}.${rand(1,254)}`),
    c.dim(`Welcome to ${dist.name}`),
    c.dim(` * Documentation:  https://help.ubuntu.com`),
    c.dim(` * Management:     https://landscape.canonical.com`),
    c.dim(` * Support:        https://ubuntu.com/advantage`),
    c.dim(``),
    c.amber(` ${rand(0,10)} updates can be applied immediately.`),
    c.dim(` ${rand(0,5)} of these updates are standard security updates.`),
    c.dim(` To see these additional updates run: apt list --upgradable`),
  ], 55);

  blank();
  await sleep(500);

  const prompt = c.green(`${user}@${host}`) + c.dim(':') + c.blue('~') + c.dim('$') + ' ';

  // ── COMMAND 1: uname ───────────────────────────────────────────────────────
  await typeLine(prompt, `uname -a`);
  await sleep(120);
  printNow(c.text(`Linux ${host} ${hw.cpu.match(/\d+\.\d+/)?.[0] ?? '6.5'}-generic #1 SMP PREEMPT_DYNAMIC x86_64 x86_64 x86_64 GNU/Linux`));
  blank();
  await sleep(600);

  // ── COMMAND 2: systemctl status (random service) ───────────────────────────
  const svcName = pick(['sshd','nginx','postgresql','docker','cron','NetworkManager','rsyslog']);
  await typeLine(prompt, `systemctl status ${svcName}`);
  await sleep(150);
  const running = rand(0,5) > 0;
  await burst([
    c.bright(`● ${svcName}.service - ${pick(['OpenSSH Server Daemon','Advanced HTTP Web Server','PostgreSQL RDBMS','Docker Application Container Engine','Regular background program processing daemon','Network Manager','System Logging Service'])}`),
    c.dim(`     Loaded: loaded (/lib/systemd/system/${svcName}.service; enabled; preset: enabled)`),
    running
      ? `     Active: <span class="c-green">active (running)</span> since ${pick(['Mon','Tue','Wed'])} ${new Date().getFullYear()}-0${rand(1,9)}-${lpad(rand(1,28),2,'0').replace(' ','0')} ${lpad(rand(0,23),2,'0').replace(' ','0')}:${lpad(rand(0,59),2,'0').replace(' ','0')}:${lpad(rand(0,59),2,'0').replace(' ','0')} UTC; ${rand(1,60)}min ${rand(0,59)}s ago`
      : `     Active: <span class="c-red">inactive (dead)</span>`,
    c.dim(`    Process: ${rand(1000,9999)} ExecStart=${pick(['/usr/sbin/sshd','/usr/sbin/nginx','/usr/lib/postgresql/15/bin/postgres'])} -D (code=exited, status=0/SUCCESS)`),
    c.dim(`   Main PID: ${rand(1000,9999)} (${svcName})`),
    c.dim(`      Tasks: ${rand(1,40)} (limit: ${rand(1000,9000)})`),
    c.dim(`     Memory: ${rand(1,500)}.${rand(0,9)}M`),
    c.dim(`        CPU: ${rand(100,9999)}ms`),
    c.dim(`     CGroup: /system.slice/${svcName}.service`),
    c.dim(`             └─${rand(1000,9999)} /usr/sbin/${svcName} -D`),
  ], 40);
  blank();
  await sleep(700);

  // ── COMMAND 3: df -h ───────────────────────────────────────────────────────
  await typeLine(prompt, `df -h`);
  await sleep(140);
  await burst([
    c.bright(`Filesystem      Size  Used Avail Use% Mounted on`),
    c.text(`${hw.disk.dev}         ${hw.disk.size}  ${rand(10,80)}G  ${rand(5,200)}G  ${rand(20,85)}% /`),
    c.dim(`tmpfs           ${rand(100,8000)}M  ${rand(1,100)}M  ${rand(100,7900)}M   ${rand(1,15)}% /dev/shm`),
    c.dim(`tmpfs           5.0M  4.0K  5.0M   1% /run/lock`),
    c.dim(`/dev/sda1       511M  6.1M  505M   2% /boot/efi`),
    c.dim(`overlay         ${hw.disk.size}  ${rand(10,80)}G  ${rand(5,200)}G  ${rand(20,85)}% /var/lib/docker/overlay2/${Array.from({length:16},()=>hex4(rand(0,0xffff))).join('')}`),
  ], 35);
  blank();
  await sleep(700);

  // ── COMMAND 4 (conditional): ip addr ──────────────────────────────────────
  if (rand(0,1)) {
    await typeLine(prompt, `ip addr show ${hw.nic.dev}`);
    await sleep(140);
    const ipA = `${rand(10,192)}.${rand(0,254)}.${rand(0,254)}.${rand(1,254)}`;
    const mac6 = Array.from({length:6},()=>hex2(rand(0,255))).join(':');
    await burst([
      c.dim(`2: ${hw.nic.dev}: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc fq_codel state UP group default qlen 1000`),
      c.dim(`    link/ether ${mac6} brd ff:ff:ff:ff:ff:ff`),
      c.text(`    inet ${ipA}/${rand(16,30)} brd ${ipA.split('.').slice(0,3).join('.')}.255 scope global dynamic ${hw.nic.dev}`),
      c.dim(`       valid_lft ${rand(1000,86000)}sec preferred_lft ${rand(1000,86000)}sec`),
    ], 40);
    blank();
    await sleep(700);
  }

  // ── COMMAND 5: tail logs ───────────────────────────────────────────────────
  await typeLine(prompt, `tail -n 8 /var/log/syslog`);
  await sleep(140);

  const logDate = () => {
    const m = pick(['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']);
    const d = lpad(rand(1,28),2,' ');
    const hh = lpad(rand(0,23),2,'0').replace(' ','0');
    const mm = lpad(rand(0,59),2,'0').replace(' ','0');
    const ss = lpad(rand(0,59),2,'0').replace(' ','0');
    return `${m} ${d} ${hh}:${mm}:${ss}`;
  };

  const logLines = Array.from({length:8}, () => {
    const svc = pick(['kernel','sshd','cron','systemd','NetworkManager','rsyslogd','CRON','dockerd','sshd','auditd']);
    const pid = rand(1000,9999);
    const msg = pick([
      `pam_unix(${pick(['sshd','sudo','login'])}:session): session opened for user ${user}`,
      `Accepted publickey for ${user} from ${rand(10,192)}.${rand(0,254)}.${rand(1,254)}.${rand(1,254)} port ${rand(1024,65535)} ssh2`,
      `(${user}) CMD (/usr/bin/find /var -name "*.log" -mtime +7 -delete)`,
      `Started Session ${rand(1,99)} of User ${user}.`,
      `INFO supervisord started with pid ${rand(1000,9999)}`,
      `DHCPREQUEST on ${hw.nic.dev} to ${rand(10,192)}.${rand(0,254)}.0.1 port 67`,
      `new mount namespace`,
      `container runtime started`,
      `kernel: [UFW BLOCK] IN=${hw.nic.dev} OUT= SRC=${rand(1,255)}.${rand(0,255)}.${rand(0,255)}.${rand(1,255)} DST=${rand(10,192)}.${rand(0,254)}.${rand(0,254)}.${rand(1,254)} PROTO=TCP`,
    ]);
    return c.dim(`${logDate()} ${host} ${svc}[${pid}]: ${msg}`);
  });

  await burst(logLines, 40);
  blank();
  await sleep(1000);
}

// ─── PHASE 8: SHUTDOWN / REBOOT ──────────────────────────────────────────────
async function phaseShutdown(host, user) {
  const prompt = c.green(`${user}@${host}`) + c.dim(':') + c.blue('~') + c.dim('$') + ' ';

  await typeLine(prompt, `sudo reboot`, rand(1800,4000));
  blank();
  await sleep(600);

  printNow(STATUS.star('Reached target Reboot.'));
  await sleep(300);
  printNow(STATUS.ok('Stopped target Default.'));
  await sleep(180);
  printNow(STATUS.ok('Stopped target Multi-User System.'));
  await sleep(180);

  const stopUnits = [
    'Stopped OpenSSH Server Daemon.',
    'Stopped System Logging Service.',
    'Stopped Cron Daemon.',
    'Stopped Network Manager.',
    'Stopped containerd container runtime.',
    'Stopped firewalld - dynamic firewall daemon.',
    'Stopped Postfix Mail Transport Agent.',
    'Unmounted /boot/efi.',
    'Stopped Journal Service.',
    'Reached target System Shutdown.',
    'Reached target Late Shutdown Services.',
    'Finished System Reboot.',
  ];

  for (const u of stopUnits) {
    printNow(STATUS.ok(u));
    await sleep(rand(80, 280));
  }

  blank();
  await sleep(300);
  printNow(c.dim('systemd-shutdown[1]: Rebooting.'));
  await sleep(500);
  printNow(c.dim('reboot: Restarting system'));
  await sleep(800);

  // clear screen simulation
  for (let i = 0; i < 6; i++) {
    blank();
    await sleep(50);
  }
  await sleep(600);
}

// ─── FULL BOOT CYCLE ─────────────────────────────────────────────────────────
async function bootCycle() {
  const kv   = kernelVer();
  const dist = distro();
  const hw   = hardware();
  const host = hostname();

  await phaseBios(hw);
  await phaseGrub(dist, kv);
  await phaseKernelStart(kv);
  await phaseDmesg(hw, kv);
  await phaseSystemd(host, dist);
  const user = await phaseLogin(host, dist);
  await phaseSession(host, user, dist, hw);
  await phaseShutdown(host, user);

  // loop indefinitely
  bootCycle();
}

bootCycle();
