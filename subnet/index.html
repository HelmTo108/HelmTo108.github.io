            /* ── stats row ── */
            .stats-row {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;

            }
            .stat-box {
                background: rgba(255,255,255,0.05);

            /* ── address bar ── */
            .bar-wrap {
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 4px;

                font-size: 0.65rem;
                text-transform: uppercase;

                border-radius: 2px;

            /* ── results table ── */

                width: 100%;
                border-collapse: collapse;

                font-size: 0.78rem;

            thead th {
                font-family: Arial, sans-serif;
                font-size: 0.65rem;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: rgba(255,255,255,0.35);
                padding: 8px 12px;
                text-align: left;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                white-space: nowrap;
            }
            tbody td {
                padding: 9px 12px;
                color: rgba(255,255,255,0.65);
                border-bottom: 1px solid rgba(255,255,255,0.06);

            tbody tr:last-child td { border-bottom: none; }
            tbody tr:hover td { background: rgba(255,255,255,0.04); }
            .td-name {
                color: #fff !important;

                align-items: center;

    <body class="is-preload">
        <div id="wrapper">

            <a class="back-link" href="/">Home</a>

            <div class="tool-wrap">
                <h1 class="tool-title">VLSM Subnet Calculator</h1>

                <!-- Base network -->
                <div class="section-label">Base network</div>
                <div class="field-row">
                    <input type="text" class="ip-input" id="baseIp" value="192.168.1.0" placeholder="Network address" />
                    <span class="slash">/</span>
                    <input type="number" class="prefix-input" id="basePrefix" value="24" min="1" max="30" />
                </div>

                <hr class="divider" />

                <!-- Subnet list -->
                <div class="section-label">Subnet requirements</div>
                <div class="subnet-header">
                    <span>Name</span>
                    <span>Hosts needed</span>
                    <span></span>
                </div>
                <div id="subnetList"></div>
                <button class="btn-add" onclick="addSubnet()">+ add subnet</button>

                <div class="err-msg" id="formErr"></div>
                <button class="btn-calc" onclick="calculate()">Calculate</button>

                <!-- Results -->
                <div id="results" style="display:none;">
                    <hr class="divider" />

                    <div class="stats-row">
                        <div class="stat-box"><div class="s-lbl">Total addresses</div><div class="s-val" id="sTotal"></div></div>
                        <div class="stat-box"><div class="s-lbl">Allocated</div><div class="s-val" id="sAlloc"></div></div>
                        <div class="stat-box"><div class="s-lbl">Remaining</div><div class="s-val" id="sRemain"></div></div>
                        <div class="stat-box"><div class="s-lbl">Efficiency</div><div class="s-val" id="sEff"></div></div>
                    </div>

                    <div class="bar-wrap">
                        <div class="bar-lbl">Address space</div>
                        <div class="addr-bar" id="addrBar"></div>
                        <div class="hover-info" id="hoverInfo">&nbsp;</div>
                        <div class="legend" id="legend"></div>
                    </div>

                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Subnet</th>
                                    <th>Network / CIDR</th>
                                    <th>Subnet mask</th>
                                    <th>Host range</th>
                                    <th>Broadcast</th>
                                    <th>Usable hosts</th>
                                </tr>
                            </thead>
                            <tbody id="resultBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>

        <!-- BG -->
        <div id="bg"></div>

        <script src="../assets/js/jquery.min.js"></script>
        <script src="../assets/js/browser.min.js"></script>
        <script src="../assets/js/breakpoints.min.js"></script>
        <script>
        const COLORS = ["#EF9F27","#1D9E75","#378ADD","#7F77DD","#D85A30","#D4537E","#639922","#2D8A90","#B07D2B","#5A4AB7"];
        let subnets = [{id:1,name:"Data center",hosts:50},{id:2,name:"Office LAN",hosts:30},{id:3,name:"Guest WiFi",hosts:10},{id:4,name:"Point-to-point",hosts:2}];
        let nextId = 5;

        function ipToInt(ip) {
            const p = ip.trim().split(".").map(Number);
            if (p.length !== 4 || p.some(x => isNaN(x) || x < 0 || x > 255)) return null;
            return ((p[0]*16777216 + p[1]*65536 + p[2]*256 + p[3]) >>> 0);
        }
        function intToIp(n) {
            n = n >>> 0;
            return `${(n>>>24)&255}.${(n>>>16)&255}.${(n>>>8)&255}.${n&255}`;
        }
        function prefixForHosts(h) {
            const bits = Math.max(2, Math.ceil(Math.log2(Math.max(h + 2, 2) + 0.001)));
            return Math.min(30, 32 - bits);
        }
        function subnetSize(p) { return Math.pow(2, 32 - p); }

        function computeVLSM(baseIp, prefix, reqs) {
            const totalSize = subnetSize(prefix);
            const baseInt = (ipToInt(baseIp) & ~(totalSize - 1)) >>> 0;
            const endInt = baseInt + totalSize;
            const sorted = [...reqs].sort((a, b) => b.hosts - a.hosts);
            let cursor = baseInt;
            const results = [];
            for (const s of sorted) {
                const p = prefixForHosts(s.hosts);
                const sz = subnetSize(p);
                const aligned = Math.ceil(cursor / sz) * sz;
                const waste = aligned - cursor;
                if (aligned + sz > endInt) {
                    results.push({...s, error: "address space exhausted", waste: 0});
                    continue;
                }
                results.push({...s, prefix: p, size: sz, error: null, waste,
                    networkInt: aligned, network: intToIp(aligned),
                    broadcast: intToIp(aligned + sz - 1),
                    firstHost: intToIp(aligned + 1), lastHost: intToIp(aligned + sz - 2),
                    mask: intToIp((~(sz - 1)) >>> 0), usable: sz - 2, offset: aligned - baseInt});
                cursor = aligned + sz;
            }
            return {results, totalSize, usedBytes: cursor - baseInt, remaining: endInt - cursor, baseInt};
        }

        function renderSubnetList() {
            document.getElementById("subnetList").innerHTML = subnets.map(s => `
                <div class="subnet-row">
                    <input type="text" class="name-input" value="${s.name}" oninput="updateSub(${s.id},'name',this.value)" />
                    <input type="number" class="hosts-input" min="1" value="${s.hosts}" oninput="updateSub(${s.id},'hosts',parseInt(this.value)||0)" />
                    <button class="btn-remove" onclick="removeSub(${s.id})">&#x2715;</button>
                </div>`).join("");
        }

        function addSubnet() {
            subnets.push({id: nextId++, name: `Subnet ${subnets.length + 1}`, hosts: 10});
            renderSubnetList();
        }
        function removeSub(id) {
            if (subnets.length <= 1) return;
            subnets = subnets.filter(s => s.id !== id);
            renderSubnetList();
        }
        function updateSub(id, field, val) {
            subnets = subnets.map(s => s.id === id ? {...s, [field]: val} : s);
        }

        function calculate() {
            const errEl = document.getElementById("formErr");
            errEl.textContent = "";
            const ip = document.getElementById("baseIp").value;
            const prefix = parseInt(document.getElementById("basePrefix").value);
            if (!ipToInt(ip)) { errEl.textContent = "Invalid base network IP address"; return; }
            if (isNaN(prefix) || prefix < 1 || prefix > 30) { errEl.textContent = "Prefix must be between 1 and 30"; return; }
            const valid = subnets.filter(s => s.hosts > 0 && s.name.trim());
            if (!valid.length) { errEl.textContent = "Add at least one subnet with hosts > 0"; return; }
            const res = computeVLSM(ip, prefix, valid);
            renderResults(res);
            document.getElementById("results").style.display = "block";
        }

        function renderResults(res) {
            document.getElementById("sTotal").textContent = res.totalSize.toLocaleString();
            document.getElementById("sAlloc").textContent = res.usedBytes.toLocaleString();
            document.getElementById("sRemain").textContent = res.remaining.toLocaleString();
            document.getElementById("sEff").textContent = Math.round(res.usedBytes / res.totalSize * 100) + "%";

            const byOffset = [...res.results].filter(r => !r.error).sort((a, b) => a.offset - b.offset);
            const colorMap = {};
            byOffset.forEach((r, i) => colorMap[r.name] = COLORS[i % COLORS.length]);

            const bar = document.getElementById("addrBar");
            const hoverInfo = document.getElementById("hoverInfo");
            bar.innerHTML = "";
            const segments = [];
            let pos = 0;
            for (const r of byOffset) {
                if (r.waste > 0) { segments.push({type:"waste", size:r.waste}); pos += r.waste; }
                segments.push({type:"subnet", size:r.size, name:r.name, color:colorMap[r.name], cidr:`${r.network}/${r.prefix}`});
                pos += r.size;
            }
            if (res.remaining > 0) segments.push({type:"free", size:res.remaining});

            for (const seg of segments) {
                const w = (seg.size / res.totalSize * 100).toFixed(4) + "%";
                const div = document.createElement("div");
                div.className = "bar-seg";
                div.style.width = w;
                if (seg.type === "subnet") {
                    div.style.background = seg.color;
                    div.onmouseenter = () => { hoverInfo.textContent = `${seg.name}  ${seg.cidr}  (${seg.size.toLocaleString()} addresses)`; };
                    div.onmouseleave = () => { hoverInfo.innerHTML = "&nbsp;"; };
                } else if (seg.type === "waste") {
                    div.style.background = "rgba(255,255,255,0.08)";
                } else {
                    div.style.background = "rgba(255,255,255,0.04)";
                    div.style.border = "none";
                }
                bar.appendChild(div);
            }

            document.getElementById("legend").innerHTML =
                byOffset.map(r => `<div class="leg-item"><div class="leg-dot" style="background:${colorMap[r.name]};"></div>${r.name}</div>`).join("") +
                `<div class="leg-item"><div class="leg-dot" style="background:rgba(255,255,255,0.15);"></div>Alignment gap</div>` +
                `<div class="leg-item"><div class="leg-dot" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);"></div>Free</div>`;

            const displayRows = [...res.results].sort((a, b) => (a.offset ?? Infinity) - (b.offset ?? Infinity));
            document.getElementById("resultBody").innerHTML = displayRows.map(r => {
                if (r.error) return `<tr><td class="td-name">${r.name}</td><td class="td-err" colspan="5">${r.error}</td></tr>`;
                const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${colorMap[r.name]};flex-shrink:0;"></span>`;
                return `<tr>
                    <td><div class="td-name">${dot}${r.name}</div></td>
                    <td>${r.network}/${r.prefix}</td>
                    <td>${r.mask}</td>
                    <td>${r.firstHost} &ndash; ${r.lastHost}</td>
                    <td>${r.broadcast}</td>
                    <td>${r.usable.toLocaleString()}</td>
                </tr>`;
            }).join("");
        }

        renderSubnetList();
        </script>

    </body>
</html>
