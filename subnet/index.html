<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subnet Calculator — aricbolder.com</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #070d1c;
      color: #c6d8f0;
      font-family: 'Consolas', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      color: #00c9a7;
      letter-spacing: -1px;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    h1 span { color: #c6d8f0; font-size: 1.4rem; }

    .badge {
      display: inline-block;
      border: 1.5px solid #f59e0b;
      color: #f59e0b;
      font-size: 1rem;
      padding: 1px 8px;
      border-radius: 4px;
    }

    .subtitle {
      color: #1b3860;
      font-size: 0.75rem;
      letter-spacing: 3px;
      margin-bottom: 2.5rem;
    }

    .card {
      background: #0a1628;
      border: 1px solid #17335a;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 700px;
    }

    .sec-label {
      color: #1b3860;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    input[type="text"],
    input[type="number"] {
      background: #0d1830;
      border: 1px solid #17335a;
      border-radius: 5px;
      color: #c6d8f0;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.6rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus { border-color: #00c9a7; }

    input.ip-input { width: 170px; }
    input.prefix-input { width: 72px; }
    input.name-input { width: 100%; }
    input.hosts-input { width: 100%; }

    .slash { color: #17335a; font-size: 1.3rem; }

    .subnet-grid-hdr {
      display: grid;
      grid-template-columns: 1fr 130px 34px;
      gap: 6px;
      margin-bottom: 4px;
    }
    .subnet-grid-hdr span {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1b3860;
      padding: 0 4px;
    }

    .subnet-row {
      display: grid;
      grid-template-columns: 1fr 130px 34px;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }

    .btn-remove {
      background: #0d1830;
      border: 1px solid #17335a;
      border-radius: 5px;
      color: #1b3860;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      width: 34px;
      height: 38px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-remove:hover { border-color: #e24b4a; color: #e24b4a; }

    .btn-add {
      background: #0d1830;
      border: 1px dashed #17335a;
      border-radius: 5px;
      color: #1b3860;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      width: 100%;
      padding: 0.5rem;
      margin-top: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-add:hover { border-color: #00c9a7; color: #00c9a7; }

    .button-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
    }

    button.primary {
      background: #00c9a7;
      border: none;
      border-radius: 5px;
      color: #070d1c;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: bold;
      padding: 0.6rem 1.4rem;
      transition: background 0.2s;
    }
    button.primary:hover { background: #00a88b; }

    button.secondary {
      background: #0d1830;
      border: 1px solid #17335a;
      border-radius: 5px;
      color: #c6d8f0;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.6rem 1.4rem;
      transition: background 0.2s;
    }
    button.secondary:hover { background: #17335a; }

    .err-msg {
      color: #e24b4a;
      font-size: 0.8rem;
      min-height: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #17335a;
      margin: 1.25rem 0;
    }

    .bar-wrap { margin-bottom: 1.25rem; }

    .addr-bar {
      display: flex;
      height: 22px;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #17335a;
      margin-bottom: 0.4rem;
    }
    .bar-seg { height: 100%; flex-shrink: 0; }
    .bar-seg:hover { opacity: 0.75; cursor: default; }

    .hover-info {
      font-size: 0.72rem;
      color: #1b3860;
      min-height: 1rem;
      letter-spacing: 1px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: #1b3860;
    }
    .leg-dot {
      width: 9px;
      height: 9px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    pre {
      background: #0d1830;
      border: 1px solid #17335a;
      border-radius: 5px;
      color: #00c9a7;
      font-family: inherit;
      font-size: 0.82rem;
      line-height: 1.6;
      overflow-x: auto;
      padding: 1rem;
      white-space: pre;
    }

    .status {
      color: #1b3860;
      font-size: 0.75rem;
      margin-top: 1rem;
      text-align: right;
    }
    .status.ready   { color: #f59e0b; }
    .status.error   { color: #e24b4a; }

    .privacy {
      color: #17335a;
      font-size: 0.75rem;
      letter-spacing: 1px;
      margin-top: 2rem;
      text-align: center;
      line-height: 1.8;
    }

    a.back {
      color: #17335a;
      font-size: 0.75rem;
      margin-top: 0.75rem;
      text-decoration: none;
    }
    a.back:hover { color: #00c9a7; }
  </style>
</head>
<body>

  <h1>SUBNET<span>CALC <span class="badge">9000</span></span></h1>
  <p class="subtitle">VARIABLE LENGTH SUBNET MASKING</p>

  <div class="card">

    <p class="sec-label">Base network</p>
    <div class="input-row">
      <input type="text" class="ip-input" id="baseIp" value="192.168.1.0" placeholder="Network address" />
      <span class="slash">/</span>
      <input type="number" class="prefix-input" id="basePrefix" value="24" min="1" max="30" />
    </div>

    <hr class="divider" />

    <p class="sec-label">Subnet requirements</p>
    <div class="subnet-grid-hdr">
      <span>Name</span><span>Hosts needed</span><span></span>
    </div>
    <div id="subnetList"></div>
    <button class="btn-add" onclick="addSubnet()">+ add subnet</button>

    <div class="button-row">
      <button class="primary" onclick="calculate()">Calculate</button>
      <button class="secondary" onclick="clearResults()">Clear</button>
    </div>
    <div class="err-msg" id="formErr"></div>

    <div id="results" style="display:none;">
      <hr class="divider" />
      <div class="bar-wrap">
        <p class="sec-label">Address space</p>
        <div class="addr-bar" id="addrBar"></div>
        <div class="hover-info" id="hoverInfo">&nbsp;</div>
        <div class="legend" id="legend"></div>
      </div>
      <pre id="output"></pre>
      <p class="status" id="status"></p>
    </div>

  </div>

  <p class="privacy">All calculations are performed locally in your browser.<br>
  No data is sent to any server.</p>
  <a class="back" href="/">← Back to aricbolder.com</a>

  <script>
    const COLORS = ["#00c9a7","#f59e0b","#378ADD","#D85A30","#7F77DD","#D4537E","#639922","#2D8A90","#B07D2B","#5A4AB7"];
    let subnets = [
      {id:1,name:"Data center",hosts:50},
      {id:2,name:"Office LAN",hosts:30},
      {id:3,name:"Guest WiFi",hosts:10},
      {id:4,name:"Point-to-point",hosts:2}
    ];
    let nextId = 5;

    function ipToInt(ip) {
      const p = ip.trim().split(".").map(Number);
      if (p.length!==4||p.some(x=>isNaN(x)||x<0||x>255)) return null;
      return((p[0]*16777216+p[1]*65536+p[2]*256+p[3])>>>0);
    }
    function intToIp(n) {
      n=n>>>0;
      return`${(n>>>24)&255}.${(n>>>16)&255}.${(n>>>8)&255}.${n&255}`;
    }
    function prefixForHosts(h) {
      const bits=Math.max(2,Math.ceil(Math.log2(Math.max(h+2,2)+0.001)));
      return Math.min(30,32-bits);
    }
    function subnetSize(p){return Math.pow(2,32-p);}

    function computeVLSM(baseIp,prefix,reqs){
      const totalSize=subnetSize(prefix);
      const baseInt=(ipToInt(baseIp)&~(totalSize-1))>>>0;
      const endInt=baseInt+totalSize;
      const sorted=[...reqs].sort((a,b)=>b.hosts-a.hosts);
      let cursor=baseInt;
      const results=[];
      for(const s of sorted){
        const p=prefixForHosts(s.hosts);
        const sz=subnetSize(p);
        const aligned=Math.ceil(cursor/sz)*sz;
        const waste=aligned-cursor;
        if(aligned+sz>endInt){results.push({...s,error:"address space exhausted"});continue;}
        results.push({...s,prefix:p,size:sz,error:null,waste,
          network:intToIp(aligned),broadcast:intToIp(aligned+sz-1),
          firstHost:intToIp(aligned+1),lastHost:intToIp(aligned+sz-2),
          mask:intToIp((~(sz-1))>>>0),usable:sz-2,offset:aligned-baseInt});
        cursor=aligned+sz;
      }
      return{results,totalSize,usedBytes:cursor-baseInt,remaining:endInt-cursor};
    }

    function renderSubnetList(){
      document.getElementById("subnetList").innerHTML=subnets.map(s=>`
        <div class="subnet-row">
          <input type="text" class="name-input" value="${s.name}" oninput="updateSub(${s.id},'name',this.value)"/>
          <input type="number" class="hosts-input" min="1" value="${s.hosts}" oninput="updateSub(${s.id},'hosts',parseInt(this.value)||0)"/>
          <button class="btn-remove" onclick="removeSub(${s.id})">&#x2715;</button>
        </div>`).join("");
    }

    function addSubnet(){subnets.push({id:nextId++,name:`Subnet ${subnets.length+1}`,hosts:10});renderSubnetList();}
    function removeSub(id){if(subnets.length<=1)return;subnets=subnets.filter(s=>s.id!==id);renderSubnetList();}
    function updateSub(id,field,val){subnets=subnets.map(s=>s.id===id?{...s,[field]:val}:s);}
    function clearResults(){document.getElementById("results").style.display="none";document.getElementById("formErr").textContent="";}

    function calculate(){
      const errEl=document.getElementById("formErr");
      errEl.textContent="";
      const ip=document.getElementById("baseIp").value;
      const prefix=parseInt(document.getElementById("basePrefix").value);
      if(!ipToInt(ip)){errEl.textContent="// Invalid base network IP address.";return;}
      if(isNaN(prefix)||prefix<1||prefix>30){errEl.textContent="// Prefix must be between 1 and 30.";return;}
      const valid=subnets.filter(s=>s.hosts>0&&s.name.trim());
      if(!valid.length){errEl.textContent="// Add at least one subnet with hosts > 0.";return;}
      const res=computeVLSM(ip,prefix,valid);
      renderBar(res);
      renderOutput(res);
      document.getElementById("results").style.display="block";
    }

    function renderBar(res){
      const byOffset=[...res.results].filter(r=>!r.error).sort((a,b)=>a.offset-b.offset);
      const colorMap={};
      byOffset.forEach((r,i)=>colorMap[r.name]=COLORS[i%COLORS.length]);

      const bar=document.getElementById("addrBar");
      const hoverInfo=document.getElementById("hoverInfo");
      bar.innerHTML="";
      const segs=[];
      for(const r of byOffset){
        if(r.waste>0)segs.push({type:"waste",size:r.waste});
        segs.push({type:"subnet",size:r.size,name:r.name,color:colorMap[r.name],cidr:`${r.network}/${r.prefix}`});
      }
      if(res.remaining>0)segs.push({type:"free",size:res.remaining});
      for(const seg of segs){
        const div=document.createElement("div");
        div.className="bar-seg";
        div.style.width=(seg.size/res.totalSize*100).toFixed(4)+"%";
        if(seg.type==="subnet"){
          div.style.background=seg.color;
          div.onmouseenter=()=>{hoverInfo.textContent=`${seg.name}  ${seg.cidr}  (${seg.size.toLocaleString()} addresses)`;};
          div.onmouseleave=()=>{hoverInfo.innerHTML="&nbsp;";};
        } else if(seg.type==="waste"){
          div.style.background="#17335a";
        } else {
          div.style.background="#0d1830";
        }
        bar.appendChild(div);
      }
      document.getElementById("legend").innerHTML=
        byOffset.map(r=>`<div class="leg-item"><div class="leg-dot" style="background:${colorMap[r.name]};"></div>${r.name}</div>`).join("")+
        `<div class="leg-item"><div class="leg-dot" style="background:#17335a;"></div>Alignment gap</div>`+
        `<div class="leg-item"><div class="leg-dot" style="background:#0d1830;border:1px solid #17335a;"></div>Free</div>`;
      bar._colorMap=colorMap;
    }

    function renderOutput(res){
      const eff=Math.round(res.usedBytes/res.totalSize*100);
      const w=54;
      const hr='═'.repeat(w);
      const baseStr=document.getElementById('baseIp').value.trim()+'/'+document.getElementById('basePrefix').value;
      let out=
        `╔${hr}╗\n`+
        `║  VLSM ALLOCATION RESULT${' '.repeat(w-24)}║\n`+
        `╠${hr}╣\n`+
        `║  Base Network : ${baseStr.padEnd(w-17)}║\n`+
        `║  Total Addrs  : ${res.totalSize.toLocaleString().padEnd(w-17)}║\n`+
        `║  Allocated    : ${res.usedBytes.toLocaleString().padEnd(w-17)}║\n`+
        `║  Remaining    : ${res.remaining.toLocaleString().padEnd(w-17)}║\n`+
        `║  Efficiency   : ${(eff+'%').padEnd(w-17)}║\n`+
        `╠${hr}╣\n`;

      const byOffset=[...res.results].filter(r=>!r.error).sort((a,b)=>a.offset-b.offset);
      const errored=res.results.filter(r=>r.error);

      for(const r of byOffset){
        out+=
          `║  [ ${r.name} ]${' '.repeat(Math.max(0,w-5-r.name.length))}║\n`+
          `║    Network  : ${(r.network+'/'+r.prefix).padEnd(w-15)}║\n`+
          `║    Mask     : ${r.mask.padEnd(w-15)}║\n`+
          `║    Range    : ${(r.firstHost+' \u2013 '+r.lastHost).padEnd(w-15)}║\n`+
          `║    Broadcast: ${r.broadcast.padEnd(w-15)}║\n`+
          `║    Usable   : ${r.usable.toLocaleString().padEnd(w-15)}║\n`+
          `╠${hr}╣\n`;
      }
      if(errored.length){
        for(const r of errored)
          out+=`║  !! ${r.name}: ${r.error}${' '.repeat(Math.max(0,w-4-r.name.length-r.error.length-2))}║\n`;
        out+=`╠${hr}╣\n`;
      }
      out=out.slice(0,-(`╠${hr}╣\n`.length));
      out+=`╚${hr}╝`;

      document.getElementById("output").textContent=out;
      const st=document.getElementById("status");
      st.textContent=errored.length?"Partial allocation — some subnets could not fit":"Allocation complete";
      st.className="status "+(errored.length?"error":"ready");
    }

    renderSubnetList();
  </script>

</body>
</html>
